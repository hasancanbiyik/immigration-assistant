name: CI

# ─── Triggers ─────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Backend tests ─────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false   # run both Python versions even if one fails

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install lightweight test dependencies
        # requirements-test.txt intentionally excludes heavy ML packages
        # (torch, sentence-transformers, chromadb). All ML services are
        # mocked in tests/conftest.py so CI finishes in ~60 seconds.
        run: pip install -r requirements-test.txt

      - name: Run test suite with coverage
        run: |
          pytest tests/ \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            -q
        env:
          # Placeholder key so GeminiService initialises without error.
          # Real Gemini calls are mocked in conftest.py.
          GEMINI_API_KEY: ci_placeholder_not_used

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'   # upload once, not twice
        with:
          file: coverage.xml
          fail_ci_if_error: false              # don't break CI if Codecov is down

  # ── 2. Frontend lint ──────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint (ESLint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  # ── 3. Docker build (main branch only) ───────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-lint]
    # Only build the Docker image on pushes to main (not on every PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: immigration-chatbot:${{ github.sha }}
          # Layer cache: reuse unchanged layers between runs
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Deploy to Fly.io ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        # --remote-only tells flyctl to build on Fly's builders (no local Docker needed).
        # Requires FLY_API_TOKEN secret: https://fly.io/user/personal_access_tokens
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
