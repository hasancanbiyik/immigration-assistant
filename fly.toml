# fly.toml app configuration file generated for immigration-assistant-weathered-shape-4901 on 2026-04-14T12:00:29-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'immigration-assistant-weathered-shape-4901'
primary_region = 'iad'

[build]

[env]
  EMBEDDING_MODEL = 'sentence-transformers/all-MiniLM-L6-v2'
  PORT = '8000'

[[mounts]]
  source = 'immigration_data'
  destination = '/app/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
